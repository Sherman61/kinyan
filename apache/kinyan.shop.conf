<VirtualHost *:80>
    ServerName kinyan.shop
    ServerAlias www.kinyan.shop
    DocumentRoot /var/www/kinyan

    <Directory /var/www/kinyan>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://kinyan.shop%{REQUEST_URI} [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/kinyan.shop-error.log
    CustomLog ${APACHE_LOG_DIR}/kinyan.shop-access.log combined
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName kinyan.shop
    ServerAlias www.kinyan.shop
    DocumentRoot /var/www/kinyan

    <Directory /var/www/kinyan>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^www\.kinyan\.shop$ [NC]
    RewriteRule ^ https://kinyan.shop%{REQUEST_URI} [R=301,L]

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog ${APACHE_LOG_DIR}/kinyan.shop-error.log
    CustomLog ${APACHE_LOG_DIR}/kinyan.shop-access.log combined

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/kinyan.shop/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/kinyan.shop/privkey.pem
</VirtualHost>
</IfModule>
