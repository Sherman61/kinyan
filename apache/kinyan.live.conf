<VirtualHost *:80>
    ServerName kinyan.live
    ServerAlias www.kinyan.live
    DocumentRoot /var/www/kinyan

    <Directory /var/www/kinyan>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/kinyan.live-error.log
    CustomLog ${APACHE_LOG_DIR}/kinyan.live-access.log combined
</VirtualHost>
