<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">K car logo</title>
  <desc id="desc">A metallic K with a sleek car emerging from the lower right side.</desc>

  <defs>
    <linearGradient id="kGrad" x1="120" y1="70" x2="345" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f4f8fb"/>
      <stop offset="0.34" stop-color="#9eafbd"/>
      <stop offset="0.68" stop-color="#304252"/>
      <stop offset="1" stop-color="#111821"/>
    </linearGradient>

    <linearGradient id="carGrad" x1="210" y1="285" x2="475" y2="397" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.38" stop-color="#aebbc5"/>
      <stop offset="0.74" stop-color="#4d5f6d"/>
      <stop offset="1" stop-color="#111820"/>
    </linearGradient>

    <linearGradient id="edgeGrad" x1="120" y1="80" x2="390" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#6f8392"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="#070b10"/>

  <g filter="url(#softShadow)">
    <!-- Main K body -->
    <path d="M112 86 L195 86 L171 247 L346 86 L432 86 L250 257 L405 426 L305 426 L183 288 L163 426 L80 426 Z"
          fill="url(#kGrad)"/>

    <!-- Bright bevel edge -->
    <path d="M112 86 L195 86 L190 105 L129 105 L99 407 L80 426 Z"
          fill="url(#edgeGrad)" opacity="0.9"/>
    <path d="M250 257 L432 86 L410 103 L239 265 Z"
          fill="#f5f8fb" opacity="0.75"/>
    <path d="M183 288 L305 426 L286 426 L174 302 Z"
          fill="#dbe5ec" opacity="0.55"/>
  </g>

  <!-- Speed blades emerging from K -->
  <g opacity="0.9">
    <path d="M185 330 C240 300 288 286 352 286 L312 306 C270 308 225 319 185 340 Z" fill="#d9e4eb"/>
    <path d="M176 363 C238 326 293 313 379 315 L332 338 C275 338 226 350 176 376 Z" fill="#8f9fad"/>
    <path d="M170 392 C240 350 310 342 410 350 L357 375 C290 370 226 379 170 406 Z" fill="#3a4b5a"/>
  </g>

  <!-- Car body -->
  <g filter="url(#softShadow)">
    <path d="M214 340
             C245 303 314 286 382 293
             C430 298 467 324 487 358
             C496 373 486 391 466 392
             L244 392
             C219 391 200 368 214 340 Z"
          fill="url(#carGrad)"/>

    <!-- Hood / nose -->
    <path d="M363 324 C414 323 452 336 478 362 C443 352 403 348 350 351 Z"
          fill="#d7e2ea" opacity="0.85"/>

    <!-- Window -->
    <path d="M262 323 C291 300 348 296 393 312 C365 313 319 317 276 335 Z"
          fill="#05080c"/>
    <path d="M293 317 C320 303 358 303 386 312"
          fill="none" stroke="#f5f8fb" stroke-width="8" stroke-linecap="round"/>

    <!-- Headlight -->
    <path d="M426 346 L465 357 L452 366 L419 355 Z"
          fill="#dff6ff"/>

    <!-- Front grille -->
    <path d="M390 377 C425 374 452 376 476 381"
          fill="none" stroke="#05080c" stroke-width="9" stroke-linecap="round"/>

    <!-- Wheels -->
    <circle cx="296" cy="389" r="36" fill="#05070a"/>
    <circle cx="296" cy="389" r="22" fill="#19222b" stroke="#c7d1d9" stroke-width="5"/>
    <circle cx="440" cy="389" r="27" fill="#05070a"/>
    <circle cx="440" cy="389" r="16" fill="#19222b" stroke="#c7d1d9" stroke-width="4"/>

    <!-- Lower highlight -->
    <path d="M230 379 C295 366 396 365 473 375"
          fill="none" stroke="#f2f6fa" stroke-width="5" opacity="0.7"/>
  </g>
</svg>
